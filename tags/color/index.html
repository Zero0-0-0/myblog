你怎么知道绿色很有生命力，以及我今天稀里糊涂地就选了绿色小猫？
绿色小猫 其实上面这么搭配不太协调。一开始我给小猫配了绿色的杀马特发型 这个时候我新开到了这顶黑色礼帽。其实我一般都是按照图册里的顺序一个一个用过去的，但是这帽子让我想起了薄荷黑巧，顺便让我想起了薄荷黑巧酸奶罐，所以口水都要留下来的我就点开了它。</p></div><footer class=entry-footer><span title='2026-03-18 08:46:12 +0800 +0800'>March 18, 2026</span>&nbsp;·&nbsp;<span>Zero</span></footer><a class=entry-link aria-label="post link to Mixture002" href=https://Zero0-0-0.github.io/myblog/posts/mixture002/></a></article></main><footer class=footer><span>&copy; 2026 <a href=https://Zero0-0-0.github.io/myblog/>My Blog</a></span> ·
